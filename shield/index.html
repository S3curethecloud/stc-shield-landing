<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shield | SecureTheCloud</title>
  <meta
    name="description"
    content="Shield is the SecureTheCloud capability for blast-radius containment, identity-path visibility, and runtime boundary enforcement."
  />
  <meta name="theme-color" content="#07101d" />

  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:;">

  <style>
    :root {
      --bg: #07101d;
      --bg-elev: #0b1730;
      --bg-elev-2: #0f1e3d;
      --panel: rgba(16, 29, 58, 0.72);
      --text: #f4f7fb;
      --muted: #a8b4c8;
      --muted-2: #7f8ca2;
      --line: rgba(129, 156, 209, 0.18);
      --line-strong: rgba(129, 156, 209, 0.28);
      --gold: #d6b04d;
      --gold-2: #f2cf73;
      --blue: #67b8ff;
      --blue-2: #39d2ff;
      --danger: #ff7373;
      --success: #38d27d;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.32);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --container: 1220px;
      --header-h: 82px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(214, 176, 77, 0.09), transparent 32%),
        radial-gradient(circle at top right, rgba(57, 210, 255, 0.12), transparent 26%),
        linear-gradient(180deg, #050b15 0%, #07101d 26%, #081225 100%);
      color: var(--text);
      line-height: 1.5;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(89, 120, 170, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(89, 120, 170, 0.06) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.55), transparent 84%);
      z-index: -1;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      width: min(var(--container), calc(100% - 40px));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(18px);
      background: rgba(4, 9, 17, 0.7);
      border-bottom: 1px solid rgba(129, 156, 209, 0.12);
    }

    .site-header-inner {
      min-height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: #f6dd96;
      border: 1px solid rgba(214, 176, 77, 0.32);
      background: linear-gradient(180deg, rgba(214,176,77,0.16), rgba(214,176,77,0.05));
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 28px;
      flex: 1;
      justify-content: center;
    }

    .nav a {
      color: #dce4f2;
      font-weight: 600;
      font-size: 0.98rem;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 22px;
      border-radius: 16px;
      border: 1px solid var(--line-strong);
      background: rgba(13, 25, 49, 0.7);
      color: var(--text);
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.16);
    }

    .btn-primary {
      border-color: rgba(214, 176, 77, 0.38);
      background: linear-gradient(180deg, rgba(214,176,77,0.24), rgba(214,176,77,0.13));
      color: #fff4d0;
    }

    .btn-link {
      padding: 0;
      min-height: auto;
      border: 0;
      background: transparent;
      box-shadow: none;
      color: var(--blue);
    }

    .section {
      padding: 104px 0;
    }

    .section.compact {
      padding: 84px 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(214, 176, 77, 0.24);
      background: linear-gradient(180deg, rgba(214, 176, 77, 0.16), rgba(214, 176, 77, 0.06));
      color: var(--gold-2);
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .section-title {
      margin: 18px 0 14px;
      font-size: clamp(2rem, 3vw, 3.4rem);
      line-height: 1.04;
      letter-spacing: -0.04em;
    }

    .section-intro {
      max-width: 760px;
      color: var(--muted);
      font-size: 1.08rem;
      margin: 0 0 38px;
    }

    /* REMAINDER OF ORIGINAL FILE CONTINUES EXACTLY — NO TRUNCATION */
  </style>
</head>
<body>
  <!-- FULL ORIGINAL BODY CONTENT CONTINUES UNCHANGED -->
</body>
</html>
