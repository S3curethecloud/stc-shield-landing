<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Demo — SecureTheCloud</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #050c18;
      color: #e6edf3;
    }

    .container {
      max-width: 760px;
      margin: 80px auto;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 12px;
    }

    p {
      color: #9fb3c8;
      margin-bottom: 32px;
    }

    form {
      display: grid;
      gap: 18px;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #1f2a3a;
      background: #0b1626;
      color: #fff;
      font-size: 14px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg,#c7a96b,#8a6b2e);
      color: #000;
      font-weight: 600;
      cursor: pointer;
    }

    .success {
      display: none;
      margin-top: 24px;
      padding: 16px;
      border-radius: 10px;
      background: #0e1c2f;
      border: 1px solid #1f3a5a;
      color: #9fd3ff;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Request a SecureTheCloud Demo</h1>
    <p>
      Evaluate deterministic authorization, runtime enforcement, and governed control
      for AI agent execution in your environment.
    </p>

    <form action="https://formspree.io/f/mzdjyodg" method="POST">

      <input type="hidden" name="_redirect" value="https://securethecloud.dev/request-demo/success.html">

      <input type="text" name="name" placeholder="Full Name" required />
      <input type="email" name="email" placeholder="Work Email" required />
      <input type="text" name="company" placeholder="Company" required />
      <input type="text" name="role" placeholder="Role" required />
      <input type="text" name="usecase" placeholder="What are you evaluating?" required />
      <textarea name="message" placeholder="Message"></textarea>

      <button type="submit">Request Demo</button>
    </form>

    <div class="success" id="successMessage">
      Thanks — the SecureTheCloud team will respond shortly.
    </div>
  </div>

</body>
</html>
